name: Build ruleset from local json
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "rules/*.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "update_version=$(date -d '+8 hours' +%Y-%m-%d)" >> ${GITHUB_ENV}
          echo "singbox_core_release_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/tags | jq -r '.[] | select(.name | contains("reF1nd") and (contains("alpha") | not)) | .name' | head -n 1 | awk -F'[v.-]' '{print $2"."$3".0"}')" >> ${GITHUB_ENV}
          echo "singbox_core_latest_version=$(curl -sSL https://raw.githubusercontent.com/reF1nd/sing-box/reF1nd-testing/docs/configuration/rule-set/source-format.md | awk '/*/ {last=$0} END {print last}' | sed -n 's/.*\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')" >> ${GITHUB_ENV}
          echo "singbox_core_compatible_version=$(curl -sSL https://raw.githubusercontent.com/reF1nd/sing-box/reF1nd-testing/docs/configuration/rule-set/source-format.md | awk '/*/{lines[++count]=$0} END{print lines[count-1]}' | sed -n 's/.*\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')" >> ${GITHUB_ENV}
          echo "singbox_rules_latest_version=$(curl -sSL https://raw.githubusercontent.com/reF1nd/sing-box/reF1nd-testing/docs/configuration/rule-set/source-format.md | awk '/*/ {last=$0} END {print last}' | sed -n 's/^* \([0-9]\+\):.*/\1/p')" >> ${GITHUB_ENV}
          echo "singbox_rules_compatible_version=$(curl -sSL https://raw.githubusercontent.com/reF1nd/sing-box/reF1nd-testing/docs/configuration/rule-set/source-format.md | awk '/*/{lines[++count]=$0} END{print lines[count-1]}' | sed -n 's/^* \([0-9]\+\):.*/\1/p')" >> ${GITHUB_ENV}
        shell: bash

      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Setup Tools
        run: |
          mkdir -p ./tools/

          echo "📦 Downloading sing-box-stable..."
          curl -o ./tools/sing-box-compatible -L "https://github.com/DustinWin/proxy-tools/releases/download/sing-box/sing-box-ref1nd-stable-linux-amd64-v3.upx"
          if [ -f "./tools/sing-box-compatible" ]; then
            chmod +x ./tools/sing-box-compatible
            echo "✅ sing-box-compatible ready"
          else
            echo "❌ Error: Could not download sing-box-compatible!"
            exit 1
          fi

          echo "📦 Downloading sing-box-test..."
          curl -o ./tools/sing-box-latest -L "https://github.com/DustinWin/proxy-tools/releases/download/sing-box/sing-box-ref1nd-test-linux-amd64-v3.upx"
          if [ -f "./tools/sing-box-latest" ]; then
            chmod +x ./tools/sing-box-latest
            echo "✅ sing-box-latest ready"
          else
            echo "❌ Error: Could not download sing-box-latest!"
            exit 1
          fi

          echo "📦 Downloading mihomo..."
          curl -o ./tools/mihomo -L "https://github.com/DustinWin/proxy-tools/releases/download/mihomo/mihomo-meta-linux-amd64-v3.upx"
          if [ -f "./tools/mihomo" ]; then
            chmod +x ./tools/mihomo
            echo "✅ mihomo ready"
          else
            echo "❌ Error: Could not download mihomo!"
            exit 1
          fi

          echo "📂 Tools directory:"
          ls -la ./tools/

      - name: Generate sing-box srs compatible
        run: |
          mkdir -p ./sing-box-ruleset-compatible/
          for json_file in ./rules/*.json; do
            if [ -f "$json_file" ]; then
              filename=$(basename "$json_file" .json)
              echo "Processing: ${filename}"
              jq '.version = ${{ env.singbox_rules_compatible_version }}' "$json_file" > "./sing-box-ruleset-compatible/${filename}.json"
              ./tools/sing-box-compatible rule-set compile "./sing-box-ruleset-compatible/${filename}.json" -o "./sing-box-ruleset-compatible/${filename}.srs"
              echo "✅ [compatible] ${filename}.srs"
            fi
          done
          echo "Generated compatible files:"
          ls -la ./sing-box-ruleset-compatible/

      - name: Generate sing-box srs latest
        run: |
          mkdir -p ./sing-box-ruleset/
          for json_file in ./rules/*.json; do
            if [ -f "$json_file" ]; then
              filename=$(basename "$json_file" .json)
              echo "Processing: ${filename}"
              jq '.version = ${{ env.singbox_rules_latest_version }}' "$json_file" > "./sing-box-ruleset/${filename}.json"
              ./tools/sing-box-latest rule-set compile "./sing-box-ruleset/${filename}.json" -o "./sing-box-ruleset/${filename}.srs"
              echo "✅ [latest] ${filename}.srs"
            fi
          done
          echo "Generated latest files:"
          ls -la ./sing-box-ruleset/

      - name: Generate mihomo mrs
        run: |
          mkdir -p ./mihomo-ruleset/

          for json_file in ./rules/*.json; do
            if [ -f "$json_file" ]; then
              filename=$(basename "$json_file" .json)
              echo "Processing: ${filename}"

              temp_yaml="temp_${filename}.yaml"
              echo "payload:" > "$temp_yaml"

              has_ip=$(jq -r '.rules[]?.ip_cidr[]? // empty' "$json_file" 2>/dev/null | head -1)

              if [ -n "$has_ip" ]; then
                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - '$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].ip_cidr[]? // empty' "$json_file")

                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - '$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].ip_cidr6[]? // empty' "$json_file")

                if [ $(wc -l < "$temp_yaml") -gt 1 ]; then
                  ./tools/mihomo convert-ruleset ipcidr yaml "$temp_yaml" "./mihomo-ruleset/${filename}.mrs"
                  echo "✅ [MRS-IP] ${filename}.mrs"
                fi
              else
                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - '+.$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].domain_suffix[]? // empty' "$json_file")

                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - '$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].domain[]? // empty' "$json_file")

                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - 'DOMAIN-KEYWORD,$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].domain_keyword[]? // empty' "$json_file")

                while IFS= read -r line; do
                  [[ -n "$line" ]] && echo "  - 'DOMAIN-REGEX,$line'" >> "$temp_yaml"
                done < <(jq -r '.rules[].domain_regex[]? // empty' "$json_file")

                if [ $(wc -l < "$temp_yaml") -gt 1 ]; then
                  ./tools/mihomo convert-ruleset domain yaml "$temp_yaml" "./mihomo-ruleset/${filename}.mrs"
                  echo "✅ [MRS-Domain] ${filename}.mrs"
                else
                  echo "⚠️ [MRS] Skipped empty ruleset: ${filename}"
                fi
              fi

              rm -f "$temp_yaml"
            fi
          done

          echo "Generated mrs files:"
          ls -la ./mihomo-ruleset/

      - name: Release and upload `sing-box-ruleset-compatible` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: sing-box-ruleset-compatible
          tag: sing-box-ruleset-compatible
          overwrite: true
          body: |
            [sing-box 内核](https://github.com/SagerNet/sing-box) rule_set 规则集文件
            适用于 v${{ env.singbox_core_compatible_version }}-v${{ env.singbox_core_latest_version }}（不包含）系列版本的 sing-box 内核（`"version": ${{ env.singbox_rules_compatible_version }}`）
            规则集文件更新于 ${{ env.update_version }}
          file_glob: true
          file: ./sing-box-ruleset-compatible/*

      - name: Commit and push `sing-box-ruleset-compatible` branch
        run: |
          cd ./sing-box-ruleset-compatible/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b sing-box-ruleset-compatible
          git add . && git commit -m "sing-box 内核 rule_set 规则集文件更新于 ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin sing-box-ruleset-compatible

      - name: Release and upload `sing-box-ruleset` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: sing-box-ruleset
          tag: sing-box-ruleset
          overwrite: true
          body: |
            [sing-box 内核](https://github.com/SagerNet/sing-box) rule_set 规则集文件
            适用于 v${{ env.singbox_core_latest_version }} 系列版本的 sing-box 内核（`"version": ${{ env.singbox_rules_latest_version }}`）
            规则集文件更新于 ${{ env.update_version }}
          file_glob: true
          file: ./sing-box-ruleset/*

      - name: Commit and push `sing-box-ruleset` branch
        run: |
          cd ./sing-box-ruleset/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b sing-box-ruleset
          git add . && git commit -m "sing-box 内核 rule_set 规则集文件更新于 ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin sing-box-ruleset

      - name: Release and upload `mihomo-ruleset` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: mihomo-ruleset
          tag: mihomo-ruleset
          overwrite: true
          body: |
            [mihomo 内核](https://github.com/MetaCubeX/mihomo) rule-set 规则集文件
            规则集文件更新于 ${{ env.update_version }}
          file_glob: true
          file: ./mihomo-ruleset/*

      - name: Commit and push `mihomo-ruleset` branch
        run: |
          cd ./mihomo-ruleset/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b mihomo-ruleset
          git add . && git commit -m "mihomo 内核 rule-set 规则集文件更新于 ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin mihomo-ruleset

      - name: Purge jsDelivr CDN
        run: |
          cd ./sing-box-ruleset-compatible/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@sing-box-ruleset-compatible/${file}"
          done
          cd ../sing-box-ruleset/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@sing-box-ruleset/${file}"
          done
          cd ../mihomo-ruleset/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@mihomo-ruleset/${file}"
          done

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
